version: "3.9"

services:
  # Atlas Agent API — FastAPI with sync, stream, and async endpoints
  agent-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - WORKER_MODE=api
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Celery worker — processes long-running agent tasks from the queue
  agent-worker:
    build: .
    command: celery -A api.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - WORKER_MODE=worker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Redis — task queue broker and result backend
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # PostgreSQL — session checkpoints and trajectory logs
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       atlas
      POSTGRES_USER:     atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus — metrics scraping
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  redis_data:
  pgdata:
